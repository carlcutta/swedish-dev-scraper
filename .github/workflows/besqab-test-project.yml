name: Besqab Test Single Project

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape Hertha
        run: python tools/besqab_test_project.py

      - name: Export CSV
        run: python tools/export_csv.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest/besqab.json data/latest/apartments.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "test: besqab hertha scrape $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
