name: Besqab Test Single Project

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape Hertha
        run: python tools/besqab_test_project.py

      - name: Export CSV
        run: python tools/export_csv.py

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: besqab-apartments-csv
          path: data/latest/apartments.csv
          retention-days: 7
